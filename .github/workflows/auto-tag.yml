name: Auto-tag release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  actions: read

jobs:
  auto-tag:
    uses: tylerbutler/actions/.github/workflows/auto-tag.yml@17116c2d3dfb57c2db7967fcecf0fc878e4cb6cf
    with:
      create-release: true
      wait-for-publish: true
      publish-workflow-name: Publish
