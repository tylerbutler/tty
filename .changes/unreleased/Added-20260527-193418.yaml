kind: Added
body: |
  `color_level_from_int/1` for round-tripping a rank back to a `ColorLevel`.

  Returns `Ok(ColorLevel)` for `0..3` and `Error(Nil)` otherwise, making it
  the public inverse of `color_level_to_int/1`. Useful for serializing and
  restoring a detected level across process boundaries.
